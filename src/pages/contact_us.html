<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>My Courses</title>
        <link rel="stylesheet" href="../styles/global.css" />
        <link rel="stylesheet" href="../styles/contact_us.css" />
    </head>
    <body>
        <header>
            <nav class="navbar">
                <div class="container">
                    <a href="#" class="navbar-brand">Peak</a>
                    <button class="navbar-toggler">
                        <svg
                            xmlns="http://www.w3.org/2000/svg"
                            height="24px"
                            viewBox="0 -960 960 960"
                            width="24px"
                            fill="currentColor">
                            <path d="M120-240v-80h720v80H120Zm0-200v-80h720v80H120Zm0-200v-80h720v80H120Z" />
                        </svg>
                    </button>
                    <div class="navbar-collapse">
                        <ul class="navbar-nav">
                            <li class="nav-item">
                                <a href="../../index.html" class="nav-link">Home</a>
                            </li>
                            <li class="nav-item">
                                <a href="my_courses.html" class="nav-link">My Courses</a>
                            </li>
                            <li class="nav-item">
                                <a href="add_course.html" class="nav-link">Add Courses</a>
                            </li>
                            <li class="nav-item">
                                <a href="contact_us.html" class="nav-link active">Contact Us</a>
                            </li>
                        </ul>
                    </div>
                </div>
            </nav>
        </header>

        <main>
            <div class="container">
                <h1 class="text-center">My Courses</h1>

                <svg class="center" height="10" viewBox="0 0 250 10" preserveAspectRatio="none">
                    <path
                        d="M 5 5 Q 60 2, 120 5 T 250 5"
                        stroke="#D4A577"
                        stroke-width="2.5"
                        fill="none"
                        stroke-linecap="round"></path>
                </svg>

                <div class="form-container">
                    <form action="" class="margin-x-auto">
                        <div class="input-groupe">
                            <label for="name"> Name* </label>
                            <input name="name" id="name" type="text" placeholder="e.g., Feras" required />
                        </div>
                        <div class="input-groupe">
                            <label for="email"> Email* </label>
                            <input
                                name="email"
                                id="email"
                                type="email"
                                placeholder="e.g., firas.alamour@gmail.com"
                                required />
                        </div>
                        <div class="input-groupe">
                            <label for="phone"> Phone Number </label>
                            <input name="phone" id="phone" type="tel" placeholder="e.g., 01012345678" />
                        </div>
                        <div class="input-groupe">
                            <label for="message"> message </label>
                            <textarea
                                name="message"
                                id="message"
                                rows="5"
                                placeholder="Your message to us"
                                required></textarea>
                        </div>

                        <button class="cta" type="submit">Send</button>
                    </form>
                </div>
            </div>
        </main>

        <footer>
            <div class="container">
                <p class="title">Peak Courses Catalog System</p>
                <p class="description">Organizing your academic journey, one course at a time</p>
                <div class="credit">@ 2026 Peak Courses • Made by Kiwi64bit</div>
            </div>
        </footer>
    </body>
</html>
